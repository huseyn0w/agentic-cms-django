{% comment %}
  The one public site footer. Shared by public_base.html and core/home.html.
  Keeps the plugin "public_footer" region available site-wide.
{% endcomment %}
{% load plugin_hooks %}
<footer class="mx-auto w-full max-w-5xl px-6 py-12">
  {% hook "public_footer" %}
  <div class="flex flex-col gap-4 border-t border-border pt-8 text-xs text-text-subtle sm:flex-row sm:items-center sm:justify-between">
    <p class="font-mono uppercase tracking-wide">© {% now "Y" %} {{ site.site_name }}</p>
    <nav class="flex items-center gap-4" aria-label="Footer">
      <a class="transition-colors hover:text-text" href="{% url 'content:post_list' %}">Blog</a>
      <a class="transition-colors hover:text-text" href="{% url 'content:service_list' %}">Services</a>
      <a class="transition-colors hover:text-text" href="{% url 'core:contact' %}">Contact</a>
    </nav>
  </div>
</footer>
