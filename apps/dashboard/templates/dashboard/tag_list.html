{% extends "dashboard/base.html" %}

{% block content %}
<div class="mb-6 flex items-center justify-end">
  {% if perms.content.add_tag %}
    <a href="{% url 'dashboard:tag_create' %}"
       class="rounded-full bg-ink px-4 py-2 text-sm font-medium text-paper transition-transform hover:-translate-y-0.5">New tag</a>
  {% endif %}
</div>
<div class="overflow-hidden rounded-2xl border border-ink/10 bg-surface">
  <table class="w-full text-sm">
    <thead class="border-b border-ink/10 text-left text-xs uppercase tracking-wide text-ink/40">
      <tr><th class="px-5 py-3 font-medium">Name</th><th class="px-5 py-3 font-medium">Posts</th><th class="px-5 py-3"></th></tr>
    </thead>
    <tbody>
      {% for tag in tags %}
        <tr class="border-b border-ink/5 last:border-0">
          <td class="px-5 py-3"><a href="{% url 'dashboard:tag_edit' tag.pk %}" class="font-medium text-ink hover:text-accent">{{ tag.name }}</a></td>
          <td class="px-5 py-3 text-ink/50">{{ tag.post_count }}</td>
          <td class="px-5 py-3 text-right">
            {% if perms.content.delete_tag %}
              <form method="post" action="{% url 'dashboard:tag_delete' tag.pk %}" data-dp-confirm="Delete this tag?">
                {% csrf_token %}<button type="submit" class="text-xs text-ink/40 hover:text-accent">Delete</button>
              </form>
            {% endif %}
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="3" class="px-5 py-8 text-center text-ink/50">No tags yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
