{% extends "dashboard/base.html" %}

{% block content %}
<form method="post" class="dp-form mx-auto max-w-lg space-y-5">
  {% csrf_token %}
  {% if form.non_field_errors %}
    <div class="rounded-lg bg-error-bg px-4 py-3 text-sm text-error">{{ form.non_field_errors }}</div>
  {% endif %}
  {% for field in form %}
    {% include "dashboard/_field.html" with field=field %}
  {% endfor %}
  <div class="flex items-center gap-3">
    <button type="submit" class="rounded-full bg-ink px-5 py-2.5 text-sm font-medium text-paper transition-transform hover:-translate-y-0.5">Save</button>
    <a href="{% url 'dashboard:menu_list' %}" class="text-sm text-text-muted hover:text-text">Cancel</a>
  </div>
</form>
{% endblock %}
