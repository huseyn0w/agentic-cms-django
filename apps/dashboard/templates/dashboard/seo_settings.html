{% extends "dashboard/base.html" %}

{% block content %}
<form method="post" enctype="multipart/form-data" class="dp-form max-w-lg space-y-5">
  {% csrf_token %}
  {% if form.non_field_errors %}
    <div class="rounded-lg bg-accent/5 px-4 py-3 text-sm text-accent">{{ form.non_field_errors }}</div>
  {% endif %}
  {% for field in form %}
    {% include "dashboard/_field.html" with field=field %}
  {% endfor %}
  <button type="submit" class="rounded-full bg-ink px-5 py-2.5 text-sm font-medium text-paper transition-transform hover:-translate-y-0.5">
    Save SEO settings
  </button>
</form>
{% endblock %}
