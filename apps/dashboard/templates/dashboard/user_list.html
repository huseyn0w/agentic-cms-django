{% extends "dashboard/base.html" %}

{% block content %}
<div class="overflow-hidden rounded-2xl border border-ink/10 bg-surface">
  <table class="w-full text-sm">
    <thead class="border-b border-ink/10 text-left text-xs uppercase tracking-wide text-ink/40">
      <tr>
        <th class="px-5 py-3 font-medium">User</th>
        <th class="px-5 py-3 font-medium">Email</th>
        <th class="px-5 py-3 font-medium">Roles</th>
        <th class="px-5 py-3 font-medium">Active</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
        <tr class="border-b border-ink/5 last:border-0">
          <td class="px-5 py-3">
            <a href="{% url 'dashboard:user_edit' u.pk %}" class="font-medium text-ink hover:text-accent">{{ u.username }}</a>
          </td>
          <td class="px-5 py-3 text-ink/60">{{ u.email|default:"—" }}</td>
          <td class="px-5 py-3 text-ink/60">{{ u.role_names|join:", "|default:"—" }}</td>
          <td class="px-5 py-3">{% if u.is_active %}✓{% else %}—{% endif %}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% include "dashboard/_pagination.html" %}
{% endblock %}
