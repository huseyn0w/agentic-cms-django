{% extends "dashboard/base.html" %}
{% load i18n %}

{% block content %}
<form method="post" class="dp-form max-w-lg space-y-5">
  {% csrf_token %}
  {% for field in form %}
    {% include "dashboard/_field.html" with field=field %}
  {% endfor %}
  <button type="submit" class="rounded-full bg-ink px-5 py-2.5 text-sm font-medium text-paper transition-transform hover:-translate-y-0.5">
    {% trans "Save settings" %}
  </button>
</form>
{% endblock %}
